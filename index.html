          if(sec.tipo==="interferencias") init.interferencias={ linhas:sec.linhas.map(()=>({v:null,altura:""})) };
          if(sec.tipo==="maquinas") init.maquinas={ linhas:sec.linhas.map(()=>({nec:null,insp:null})) };
          if(sec.tipo==="interferencias_matriz") init.interferencias_matriz={ redes:sec.redes.map(r=>({ tipo:null, perguntas:r.perguntas.map(()=>null), altura:"" })) };
          if(sec.tipo==="medicao") init.medicao={ medidor:{fabricante:"",modelo:"",calibracao:"",hora:"",responsavel:""}, gases:{}, purga_lavagem:null, purga_qual:null, vent_exaustao:null, vent_qual:null, medidor2:{fabricante:"",modelo:"",calibracao:"",hora:"",responsavel:""}, gases2:{} };
          if(sec.tipo==="comunicacao") init.comunicacao={ opcao:null, disp:null };
          if(sec.tipo==="metodo_altura") init.metodo_altura={ sist_ancoragem:null, carga_max:null, ponto_ancoragem:null, ponto_fixacao:null, linha_vida:null, linha_fixacao:null };
          if(sec.tipo==="tabela_selecao") init["tab_"+sec.chave]={ itens:sec.opcoes.map(()=>({marcado:false,cap:"",insp:null})) };
          if(sec.tipo==="profundidade") init.profundidade={ opcao:null, media:"" };
          if(sec.tipo==="escoramento") init.escoramento={ disp:null, tipos:sec.tipos.map(()=>false), trapezoidal:null };
          if(sec.tipo==="carga_capacidade") init.carga_capacidade={ resp:null, peso:"" };
        });
        return init;
      });
      const setSec=(tipo,val)=>setSecoes(s=>({...s,[tipo]:typeof val==="function"?val(s[tipo]):val}));
      const [emissorNome,setEmissorNome]=useState("");
      const [emissorArea,setEmissorArea]=useState("");
      const [verifNome,setVerifNome]=useState("");
      const [verifArea,setVerifArea]=useState("");
      const [nomeTmp,setNomeTmp]=useState("");
      const [equipe,setEquipe]=useState([]);
      const [rubricaIdx,setRubricaIdx]=useState(null);
      const [toast,setToast]=useState(null);
      const [salvando,setSalvando]=useState(false);

      const mostraToast=(msg,err)=>{ setToast({msg,err}); setTimeout(()=>setToast(null),3000); };
      const setItem=(i,campo,val)=>setAval(a=>a.map((x,j)=>j===i?{...x,[campo]:val}:x));
      const addNome=()=>{ const v=nomeTmp.trim(); if(!v)return; if(equipe.length>=10){mostraToast("Máximo 10 trabalhadores.",true);return;} setEquipe([...equipe,{nome:v,rubrica:null}]); setNomeTmp(""); };
      const setRubrica=(idx,d)=>setEquipe(eq=>eq.map((m,i)=>i===idx?{...m,rubrica:d}:m));

      // ===== Documentos do dia (deste PT, neste aparelho) =====
      const [recentes,setRecentes]=useState([]);
      const [qrModal,setQrModal]=useState(null); // {url, item} ou null
      useEffect(()=>{ (async()=>{ await limparAntigas(); setRecentes((await listarLocal()).filter(r=>r.tipo===("pt_"+desc.tipo))); })(); },[]);

      const baixarRecente=(item)=>{
        try{ const blob=new Blob([item.bytes],{type:"application/pdf"}); const url=URL.createObjectURL(blob);
          const a=document.createElement("a"); a.href=url; a.download=item.nome;
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }catch(e){ mostraToast("Erro ao abrir o arquivo",true); }
      };
      const visualizarRecente=(item)=>{
        try{ const blob=new Blob([item.bytes],{type:"application/pdf"}); const url=URL.createObjectURL(blob);
          window.open(url,"_blank"); setTimeout(()=>URL.revokeObjectURL(url),60000);
        }catch(e){ mostraToast("Erro ao abrir o arquivo",true); }
      };
      async function gerarQR(item){
        if(!item.pdf_path){ mostraToast("Esta PT ainda não foi enviada ao servidor. Conecte à internet e tente de novo.",true); return; }
        if(!navigator.onLine){ mostraToast("Sem internet. O QR precisa de conexão para ser gerado.",true); return; }
        try{
          const { data, error }=await supa.storage.from("dts-pdfs").createSignedUrl(item.pdf_path, 60*60*24); // 24h
          if(error||!data){ throw error||new Error("falha ao gerar link"); }
          setQrModal({ url:data.signedUrl, item });
        }catch(e){ mostraToast("Erro ao gerar QR: "+e.message,true); }
      }

      async function gerarPDF(osEfetiva){
        const osMostrar=osEfetiva||numeroOs;
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const H=C.H;
        let tpl;
        try{ const r=await fetch(desc.arquivo); if(!r.ok)throw new Error("HTTP "+r.status); tpl=await r.arrayBuffer(); }
        catch(e){ mostraToast("Não achei "+desc.arquivo+" na pasta do app",true); return null; }
        const doc=await PDFDocument.load(tpl);
        const font=await doc.embedFont(StandardFonts.Helvetica);
        const fontB=await doc.embedFont(StandardFonts.HelveticaBold);
        const pgs=doc.getPages();
        const okNum=(n)=>typeof n==="number" && !isNaN(n);
        const put=(pi,x,top,s,size,bold)=>{ if(!okNum(x)||!okNum(top)||!pgs[pi]) return; pgs[pi].drawText(String(s==null?"":s),{x,y:H-top,size:size||7,font:bold?fontB:font,color:rgb(0,0,0)}); };
        const X=(pi,xTop,top,sz)=>{ if(!okNum(xTop)||!okNum(top)||!pgs[pi]) return; pgs[pi].drawText("X",{x:xTop+3,y:H-top,size:sz||8,font:fontB,color:rgb(0,0,0)}); };
        const center=(pi,cx,top,s,size)=>{ if(!okNum(cx)||!okNum(top)) return; const w=font.widthOfTextAtSize(String(s),size||7); put(pi,cx-w/2,top,s,size); };

        // CABEÇALHO (pág 0)
        // contratada: microcorreção do rótulo (lógica validada v5) + X no quadrado
        const rot=C.contratada.rotulo, qd=C.contratada.quad;
        const qx1=C.contratada.quad_x1!=null?C.contratada.quad_x1:(qd[0]+5);
        const qh=C.contratada.quad_h!=null?C.contratada.quad_h:8.1;
        // cobre o rótulo original inteiro e reimprime 3pt após a borda direita do quadrado
        pgs[0].drawRectangle({x:rot.x0-0.3,y:H-rot.y1-0.8,width:(rot.x1-rot.x0)+1.3,height:(rot.y1-rot.y0)+1.6,color:rgb(1,1,1)});
        // redesenha o segmento vertical da borda direita do quadrado (que o retângulo branco cobriu)
        pgs[0].drawLine({start:{x:qx1,y:H-rot.y0-1},end:{x:qx1,y:H-rot.y1-1},thickness:0.75,color:rgb(0,0,0)});
        put(0, qx1+3.0, rot.y1, "Contratada - Nome da empresa:", 6.6);
        // X no quadrado, centralizado no centro real (x0..x1, cy), tamanho adaptado
        const qx0=C.contratada.quad_x0!=null?C.contratada.quad_x0:(qd[0]-5);
        const qcy=C.contratada.quad_cy!=null?C.contratada.quad_cy:qd[1];
        const xsz=Math.max(5.0,Math.min(7.0, qh*(qh>=9?0.82:0.66)));
        pgs[0].drawText("X",{x:(qx0+qx1)/2 - font.widthOfTextAtSize("X",xsz)/2, y:H-(qcy+xsz*0.36), size:xsz, font:fontB, color:rgb(0,0,0)});
        if(tipoEquipe!=="igua"){
          const gx = C.cab.empresa_apos!=null ? C.cab.empresa_apos : (C.cab.empresa[0]+16);
          put(0, gx, C.cab.empresa[1], empresaEfetiva);
        }
        if(C.cab.setor) put(0, C.cab.setor[0]+5, C.cab.setor[1], setor);
        if(C.cab.local) put(0, C.cab.local[0]+5, C.cab.local[1], local);
        if(C.cab.lider) put(0, C.cab.lider[0]+5, C.cab.lider[1], lider);
        if(C.cab.os)    put(0, C.cab.os[0]+5, C.cab.os[1], osMostrar);
        if(C.cab.descricao) put(0, C.cab.descricao[0]+5, C.cab.descricao[1], descricao);

        // SEÇÃO ESPECIAL simples (tensão)
        if(desc.especial && desc.especial.tipo==="tensao" && especial && C.tensao[especial]){
          const t=C.tensao[especial]; X(0, t[0], t[1], 8);
        }

        // SEÇÕES ESPECIAIS RICAS (emergência, equipamentos, interferências, máquinas)
        (desc.secoes||[]).forEach(sec=>{
          const cc=C.especiais && C.especiais[sec.tipo];
          if(!cc) return;
          if(sec.tipo==="emergencia" && secoes.emergencia){
            secoes.emergencia.perguntas.forEach((v,i)=>{
              if(v && cc[i] && cc[i][v]) X(0, cc[i][v][0], cc[i][v][1], 8);
            });
            // nomes da equipe de emergência
            const nc = C.emergencia_nomes;
            if(nc && nc.baselines){
              secoes.emergencia.nomes.forEach((nm,i)=>{
                if(nm && nc.baselines[i]!=null) put(nc.pag!=null?nc.pag:0, nc.x, nc.baselines[i], nm, 6.5);
              });
            }
            // SIM/NÃO "Há equipamentos para emergência e salvamento?"
            const esn = C.emergencia_equip_sn;
            if(secoes.emergencia.temEquip && esn && esn[secoes.emergencia.temEquip]){
              const p=esn[secoes.emergencia.temEquip];
              X(esn.pag!=null?esn.pag:0, p[0], p[1], 8);
            }
          }
          if(sec.tipo==="equipamentos" && secoes.equipamentos){
            secoes.equipamentos.marcados.forEach((m,i)=>{
              if(m && cc[i]) X(0, cc[i].x, cc[i].y, 8);
            });
          }
          if(sec.tipo==="interferencias" && secoes.interferencias){
            secoes.interferencias.linhas.forEach((ln,i)=>{
              if(ln.v && cc[i] && cc[i][ln.v]) X(0, cc[i][ln.v][0], cc[i][ln.v][1], 8);
              if(ln.altura && cc[i] && cc[i].altura_xy) put(0, cc[i].altura_xy[0], cc[i].altura_xy[1], ln.altura, 6.5);
            });
          }
          if(sec.tipo==="maquinas" && secoes.maquinas){
            secoes.maquinas.linhas.forEach((ln,i)=>{
              if(ln.nec && cc[i] && cc[i]["nec_"+ln.nec]) X(0, cc[i]["nec_"+ln.nec][0], cc[i]["nec_"+ln.nec][1], 8);
              if(ln.insp && cc[i] && cc[i]["insp_"+ln.insp]) X(0, cc[i]["insp_"+ln.insp][0], cc[i]["insp_"+ln.insp][1], 8);
            });
          }
          if(sec.tipo==="interferencias_matriz" && secoes.interferencias_matriz){
            secoes.interferencias_matriz.redes.forEach((rede,i)=>{
              const cr=cc[i]; if(!cr) return;
              if(rede.tipo && cr.tipo && cr.tipo[rede.tipo]) X(0, cr.tipo[rede.tipo][0], cr.tipo[rede.tipo][1], 8);
              rede.perguntas.forEach((v,j)=>{
                if(v && cr.perguntas[j] && cr.perguntas[j][v]) X(0, cr.perguntas[j][v][0], cr.perguntas[j][v][1], 8);
              });
              if(rede.altura && cr.altura_xy) put(0, cr.altura_xy[0], cr.altura_xy[1], rede.altura, 6.5);
            });
          }
          if(sec.tipo==="comunicacao" && secoes.comunicacao){
            const co=secoes.comunicacao;
            if(co.opcao!=null && cc.opcoes && cc.opcoes[co.opcao]) X(0, cc.opcoes[co.opcao].x, cc.opcoes[co.opcao].y, 8);
            if(co.disp && cc[co.disp]) X(0, cc[co.disp][0], cc[co.disp][1], 8);
          }
          if(sec.tipo==="metodo_altura" && secoes.metodo_altura){
            const ma=secoes.metodo_altura;
            if(ma.sist_ancoragem && cc.perguntas.sist_ancoragem[ma.sist_ancoragem]) X(0, cc.perguntas.sist_ancoragem[ma.sist_ancoragem][0], cc.perguntas.sist_ancoragem[ma.sist_ancoragem][1], 8);
            if(ma.carga_max && cc.perguntas.carga_max[ma.carga_max]) X(0, cc.perguntas.carga_max[ma.carga_max][0], cc.perguntas.carga_max[ma.carga_max][1], 8);
            if(ma.ponto_ancoragem && cc.ponto_ancoragem[ma.ponto_ancoragem]) X(0, cc.ponto_ancoragem[ma.ponto_ancoragem][0], cc.ponto_ancoragem[ma.ponto_ancoragem][1], 8);
            if(ma.ponto_fixacao && cc.ponto_fixacao[ma.ponto_fixacao]) X(0, cc.ponto_fixacao[ma.ponto_fixacao][0], cc.ponto_fixacao[ma.ponto_fixacao][1], 8);
            if(ma.linha_vida && cc.linha_vida[ma.linha_vida]) X(0, cc.linha_vida[ma.linha_vida][0], cc.linha_vida[ma.linha_vida][1], 8);
            if(ma.linha_fixacao && cc.linha_fixacao[ma.linha_fixacao]) X(0, cc.linha_fixacao[ma.linha_fixacao][0], cc.linha_fixacao[ma.linha_fixacao][1], 8);
          }
        });

        // SEÇÕES NOVAS (profundidade, escoramento, carga) — loop próprio SEM o "if(!cc) return"
        (desc.secoes||[]).forEach(sec=>{
          if(sec.tipo==="carga_capacidade" && secoes.carga_capacidade){
            const cg=secoes.carga_capacidade, C2=C.especiais && C.especiais.carga_cap;
            if(C2){
              if(cg.resp && C2[cg.resp]) X(0, C2[cg.resp][0], C2[cg.resp][1], 8);
              if(cg.peso && C2.peso_xy) put(0, C2.peso_xy[0], C2.peso_xy[1], cg.peso, 5.5);
            }
          }
          if(sec.tipo==="profundidade" && secoes.profundidade){
            const pr=secoes.profundidade, C2=C.profundidade;
            if(C2){
              if(pr.opcao==="IGUAL OU SUPERIOR A 1,25m") X(C2.pag, C2.SUPERIOR[0], C2.SUPERIOR[1], 8);
              else if(pr.opcao==="IGUAL OU INFERIOR A 1,25m") X(C2.pag, C2.INFERIOR[0], C2.INFERIOR[1], 8);
              if(pr.media && C2.media_xy) put(C2.pag, C2.media_xy[0], C2.media_xy[1], pr.media, 7);
            }
          }
          if(sec.tipo==="escoramento" && secoes.escoramento){
            const es=secoes.escoramento, C2=C.escoramento;
            if(C2){
              if(es.disp && C2.disp && C2.disp[es.disp]) X(C2.pag, C2.disp[es.disp][0], C2.disp[es.disp][1], 8);
              (sec.tipos||[]).forEach((t,i)=>{ if(es.tipos[i] && C2.tipos && C2.tipos[t]) X(C2.pag, C2.tipos[t][0], C2.tipos[t][1], 8); });
              if(es.outros && C2.outros_xy) put(C2.pag, C2.outros_xy[0], C2.outros_xy[1], es.outros, 6.5);
              if(es.trapezoidal && C2.trapezoidal && C2.trapezoidal[es.trapezoidal]) X(C2.pag, C2.trapezoidal[es.trapezoidal][0], C2.trapezoidal[es.trapezoidal][1], 8);
            }
          }
        });

        // MEDIÇÃO DE ATMOSFERA (campos de texto) — usa C.especiais_medicao
        if(secoes.medicao && C.especiais_medicao){
          const M=C.especiais_medicao;
          const md=secoes.medicao.medidor||{};
          Object.keys(M.medidor||{}).forEach(k=>{ if(md[k]) put(0, M.medidor[k][0], M.medidor[k][1], md[k], 6.5); });
          Object.keys(M.gases||{}).forEach(k=>{ const val=secoes.medicao.gases[k]; if(val){ center(0, M.gases[k], M.vy, val, 6.5); } });
          // perguntas SIM/NÃO/NA + sub-opções (PURGA/LAVAGEM/VENTILAÇÃO/EXAUSTÃO)
          if(M.perguntas){
            const P=M.perguntas, s=secoes.medicao;
            if(s.purga_lavagem && P.purga_lavagem && P.purga_lavagem[s.purga_lavagem]) X(0, P.purga_lavagem[s.purga_lavagem][0], P.purga_lavagem[s.purga_lavagem][1], 8);
            if(s.purga_qual && P.purga_qual && P.purga_qual[s.purga_qual]) X(0, P.purga_qual[s.purga_qual][0], P.purga_qual[s.purga_qual][1], 8);
            if(s.vent_exaustao && P.vent_exaustao && P.vent_exaustao[s.vent_exaustao]) X(0, P.vent_exaustao[s.vent_exaustao][0], P.vent_exaustao[s.vent_exaustao][1], 8);
            if(s.vent_qual && P.vent_qual && P.vent_qual[s.vent_qual]) X(0, P.vent_qual[s.vent_qual][0], P.vent_qual[s.vent_qual][1], 8);
          }
          // 2ª medição (após métodos de purga/lavagem/ventilação)
          const M2 = C.especiais && C.especiais.medicao2;
          if(M2){
            const md2=secoes.medicao.medidor2||{};
            ["fabricante","modelo","calibracao","hora","responsavel"].forEach(k=>{ if(md2[k] && M2[k]) put(0, M2[k][0], M2[k][1], md2[k], 6.5); });
            const g2=secoes.medicao.gases2||{};
            Object.keys(M2.gases||{}).forEach(k=>{ if(g2[k]) center(0, M2.gases[k][0], M2.gases[k][1], g2[k], 6.5); });
          }
        }

        // CLASSIFICAÇÃO MR/MP por trabalhador (Mergulho)
        if(desc.classificacaoTrab && C.especiais && C.especiais.classificacao){
          const cpag = C.trabalhadoresPag!=null?C.trabalhadoresPag:0;
          equipe.forEach((m,i)=>{
            const cl=C.especiais.classificacao[i];
            if(cl && m.classificacao && cl[m.classificacao]) X(cpag, cl[m.classificacao][0], cl[m.classificacao][1], 8);
          });
        }
        // FUNÇÃO por trabalhador (Mergulho)
        if(desc.classificacaoTrab && C.funcaoTrab){
          const ft=C.funcaoTrab;
          equipe.forEach((m,i)=>{
            if(m.funcao && ft.ys && ft.ys[i]!=null) center(ft.pag!=null?ft.pag:0, ft.cx, ft.ys[i], m.funcao, 6.5);
          });
        }

        // TABELAS DE SELEÇÃO (Içamento: veículos e acessórios) — checkbox + capacidade
        (desc.secoes||[]).forEach(sec=>{
          if(sec.tipo!=="tabela_selecao") return;
          const st=secoes["tab_"+sec.chave]; if(!st) return;
          const cc=C.especiais && C.especiais[sec.coordKey];
          if(!cc) return;
          st.itens.forEach((it,i)=>{
            if(!cc[i]) return;
            if(it.marcado && cc[i].chk) X(0, cc[i].chk[0], cc[i].chk[1], 8);
            if(it.cap && cc[i].cap) put(0, cc[i].cap[0], cc[i].cap[1], it.cap, 6.5);
            if(it.insp && cc[i].insp && cc[i].insp[it.insp]) X(0, cc[i].insp[it.insp][0], cc[i].insp[it.insp][1], 8);
          });
        });

        // AVALIAÇÃO
        C.itens.forEach((it,i)=>{
          const resp=aval[i] && aval[i].v;
          if(!resp) return;
          const col = resp==="SIM"?it[1] : resp==="NÃO"?it[2] : it[3];
          if(col!=null){
            const itPag = (C.itensPag && C.itensPag[i]!=null) ? C.itensPag[i]
                        : (desc.itensPag && desc.itensPag[i]!=null) ? desc.itensPag[i] : 0;
            X(itPag, col, it[0], 8);
          }
          if(aval[i].obs){
            const itPag2 = (C.itensPag && C.itensPag[i]!=null) ? C.itensPag[i]
                        : (desc.itensPag && desc.itensPag[i]!=null) ? desc.itensPag[i] : 0;
            const ox = C.obs_x!=null ? C.obs_x : 470;
            const txt = String(aval[i].obs).slice(0,42);
            put(itPag2, ox, it[0], txt, 5.5);
          }
        });

        // segura + ciente
        if(segura && C.segura && C.segura[segura]){
          const sPag = (C.segura.pag!=null) ? C.segura.pag : 0;
          X(sPag, C.segura[segura][0], C.segura[segura][1], 8);
        }
        if(ciente && C.ciente){
          const ci = Array.isArray(C.ciente) ? {pag:0, xy:C.ciente} : C.ciente;
          if(ci.xy && ci.xy[0]!=null && ci.xy[1]!=null) X(ci.pag!=null?ci.pag:0, ci.xy[0], ci.xy[1], 8);
        }

        // EMISSÃO
        if(C.emissao){
          const pe=C.emissao.pag, cs=C.emissao.centros, vy=C.emissao.vy;
          center(pe, cs[0], vy, fmtData(agora.current));
          center(pe, cs[1], vy, fmtHora(agora.current));
          center(pe, cs[2], vy, turno);
        }

        // TRABALHADORES: nome + rubrica na célula de assinatura
        const trabPag = C.trabalhadoresPag!=null ? C.trabalhadoresPag : (C.emissao?C.emissao.pag:0);
        for(let i=0;i<(C.trabalhadores||[]).length;i++){
          if(i>=equipe.length) break;
          const pos=C.trabalhadores[i];
          put(trabPag, pos[0], pos[1], equipe[i].nome, 6.5);
          // rubrica centralizada na célula de assinatura (H e V), contida na altura da linha
          if(equipe[i].rubrica && C.assinaturas && C.assinaturas[i]){
            try{
              const png=await doc.embedPng(equipe[i].rubrica);
              const sig=C.assinaturas[i];
              const cw=(sig.x1-sig.x0);
              const cellH=(sig.cell_bot!=null && sig.cell_top!=null)?(sig.cell_bot-sig.cell_top):15;
              const maxW=Math.min(cw-6,66), maxH=Math.min(cellH-3,13);
              const ar=png.width/png.height; let rw=maxW, rh=rw/ar; if(rh>maxH){rh=maxH; rw=rh*ar;}
              const cy=(sig.cell_cy!=null)?sig.cell_cy:(sig.yb-5);
              const sp = (C.assinaturasPag!=null?C.assinaturasPag:trabPag);
              pgs[sp].drawImage(png,{x:sig.cx-rw/2, y:H-cy-rh/2, width:rw, height:rh});
            }catch(_){}
          }
        }

        // EMISSOR / VERIFICADOR
        if(C.emissor_verif){
          const ep = C.emissorPag!=null ? C.emissorPag : (C.emissao?C.emissao.pag:0);
          if(C.emissor_verif.emissor){ put(ep, C.emissor_verif.emissor[0], C.emissor_verif.emissor[1], emissorNome); }
          if(C.emissor_verif.verif){ put(ep, C.emissor_verif.verif[0], C.emissor_verif.verif[1], verifNome); }
          if(C.emissor_verif.emissor_area && emissorArea){ center(ep, C.emissor_verif.emissor_area[0], C.emissor_verif.emissor_area[1], emissorArea, 6.5); }
          if(C.emissor_verif.verif_area && verifArea){ center(ep, C.emissor_verif.verif_area[0], C.emissor_verif.verif_area[1], verifArea, 6.5); }
        }

        const bytes=await doc.save();
        const blob=new Blob([bytes],{type:"application/pdf"}); const url=URL.createObjectURL(blob);
        const a=document.createElement("a"); a.href=url; a.download="PT_"+desc.tipo+"_"+(numeroOs||"sem_os")+".pdf";
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        return bytes;
      }

      function montarRegistro(osEfetiva,osBase){

          horario_emissao:fmtHora(agora.current), turno,
          tipo_equipe:tipoEquipe, empresa:empresaEfetiva, setor,
          local_trabalho:local, lider_atividade:lider, descricao_trabalho:descricao,
          avaliacao: aval.map((x,i)=>({item:i+1, resposta:x.v, obs:x.obs})),
          atividade_segura:segura, ciente,
          especificos: desc.especial ? { [desc.especial.tipo]: especial } : {},
          emissor_nome:emissorNome, emissor_area:emissorArea,
          verificador_nome:verifNome, verificador_area:verifArea,
          status:"finalizada"
        };
      }

      async function enviarPT(registro, colaboradores, bytes, osNome){
        const nome="pt/PT_"+desc.tipo+"_"+(osNome||"sem_os")+"_"+Date.now()+".pdf";
        const { error:e3 }=await supa.storage.from("dts-pdfs").upload(nome, new Blob([bytes],{type:"application/pdf"}), {upsert:true,contentType:"application/pdf"});
        if(e3) throw e3;
        const { data:ins, error }=await supa.from("pt").insert({...registro, pdf_path:nome}).select().single();
        if(error){ try{ await supa.storage.from("dts-pdfs").remove([nome]); }catch(_){} throw error; }
        if(colaboradores && colaboradores.length){
          const rows=colaboradores.map((nome,i)=>({pt_id:ins.id,nome,ordem:i}));
          const { error:e2 }=await supa.from("pt_colaborador").insert(rows); if(e2) throw e2;
        }
        return { id:ins.id, pdf_path:nome };
      }

      async function salvarEGerar(){
        if(!numeroOs.trim()){ mostraToast("Preencha o Nº da O.S (TOA).",true); return; }
        if(tipoEquipe==="contratada" && !empresaEfetiva.trim()){ mostraToast("Informe a empresa contratada.",true); return; }
        if(!local.trim()){ mostraToast("Preencha o Local do Trabalho.",true); return; }
        if(desc.especial && !especial){ mostraToast("Selecione: "+desc.especial.label,true); return; }
        const semResp=aval.map((x,i)=>x.v?null:i+1).filter(Boolean);
        if(semResp.length){ mostraToast("Responda os itens: "+semResp.join(", "),true); return; }
        if(!segura){ mostraToast("Marque se a atividade está segura para ser realizada.",true); return; }
        if(C.ciente && !ciente){ mostraToast("Marque o campo \"Sim, estou ciente\" para continuar.",true); return; }
        if(!equipe.length){ mostraToast("Adicione ao menos um trabalhador.",true); return; }
        const semRub=equipe.filter(m=>!m.rubrica).map(m=>m.nome);
        if(semRub.length){ mostraToast("Falta rubrica de: "+semRub.join(", "),true); return; }

        setSalvando(true);
        try{
          const hoje=agora.current.toISOString().slice(0,10);
          const osBase=numeroOs.trim(); let osEfetiva=osBase; const online=navigator.onLine;
          if(online){ try{ const {data:ex}=await supa.from("pt").select("id").eq("tipo",desc.tipo).eq("numero_os_base",osBase).eq("data_atividade",hoje);
            const n=(ex||[]).length; if(n>0) osEfetiva=osBase+" Rev."+String(n).padStart(2,"0"); }catch(_){} }
          const bytes=await gerarPDF(osEfetiva); if(!bytes){ setSalvando(false); return; }
          const registro=montarRegistro(osEfetiva,osBase);
          const colaboradores=equipe.map(m=>m.nome);
          const osNome=(osEfetiva||"sem_os").replace(/[^\w.-]+/g,"_");
          const localId="pt_"+desc.tipo+"_"+Date.now();
          const baseItem={ id:localId, tipo:"pt_"+desc.tipo, nome:"PT_"+desc.tipo+"_"+osNome+".pdf",
            data:fmtData(agora.current), dataISO:new Date().toISOString(), atividade:"PT "+desc.titulo, bytes };
          await salvarLocal(baseItem);
          setRecentes((await listarLocal()).filter(r=>r.tipo===("pt_"+desc.tipo)));
          if(online){
            try{ const res=await enviarPT(registro, colaboradores, bytes, osNome);
              if(res && res.pdf_path){ await salvarLocal({...baseItem, pdf_path:res.pdf_path});
                setRecentes((await listarLocal()).filter(r=>r.tipo===("pt_"+desc.tipo))); }
              mostraToast(osEfetiva!==osBase?("PT enviada como "+osEfetiva+"."):"PT salva e enviada!");
            }catch(e){ mostraToast("Sem conexão estável. Salva localmente.",true); }
          } else { mostraToast("Offline: PT salva localmente.",true); }
        }catch(e){ mostraToast("Erro: "+e.message,true); }
        finally{ setSalvando(false); }
      }

        <div style={{padding:16,maxWidth:480,margin:"0 auto"}}>
          <p className="hint">Escolha o tipo de PT.</p>
          {PTS.map(p=>(
            <button key={p.id} disabled={!p.ativo} onClick={()=>p.ativo&&onEscolher(p.id)}
              style={{width:"100%",textAlign:"left",padding:"14px 16px",marginBottom:10,borderRadius:10,
              border:"1px solid "+(p.ativo?"#185FA5":"#ddd"),background:p.ativo?"#fff":"#f5f5f5",
              color:p.ativo?"#0C447C":"#aaa",cursor:p.ativo?"pointer":"default",fontSize:15,fontWeight:600}}>
              {p.nome}<br/><span style={{fontSize:11,fontWeight:400}}>{p.cod}{p.ativo?"":" · em breve"}</span>
            </button>
          ))}
        </div>
      </div>);
    }

    // Sub-tela de um documento: escolher Preencher ou Administrador
    function DocHub({ titulo, sub, corAdm, onVoltar, onPreencher, onAdmin, labelPreencher }){
      return (<div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <div className="header">
          <a onClick={onVoltar} style={{color:"#B5D4F4",cursor:"pointer",fontSize:13,display:"inline-block",marginBottom:6}}>← Início</a>
          <h1>{titulo}</h1>
          <p>{sub}</p>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",gap:14,padding:24,maxWidth:420,margin:"0 auto",width:"100%"}}>
          <button className="btn btn-blue" style={{padding:"18px",fontSize:16}} onClick={onPreencher}>
            {labelPreencher||"Preencher"}<br/><span style={{fontSize:12,fontWeight:400,opacity:.85}}>Colaborador</span>
          </button>
          <button className="btn btn-light" style={{padding:"18px",fontSize:16}} onClick={onAdmin}>
            Administrador<br/><span style={{fontSize:12,fontWeight:400,opacity:.7}}>Relatórios por período</span>
          </button>
        </div>
      </div>);
    }

    // Tela inicial: escolher documento (DTS / PT / Checklist)
    function Root(){
      // inicio | dts_hub | dts | dts_adm | pt_hub | pt_menu | pt_quente | pt_adm
      const [modo,setModo]=useState("inicio");
      const [qrApp,setQrApp]=useState(false);

      // DTS
      if(modo==="dts_hub") return <DocHub titulo="DTS" sub="Discussão de Trabalho Seguro" onVoltar={()=>setModo("inicio")}
        labelPreencher="Preencher DTS" onPreencher={()=>setModo("dts")} onAdmin={()=>setModo("dts_adm")} />;
      if(modo==="dts") return <App onVoltar={()=>setModo("dts_hub")} />;
      if(modo==="dts_adm") return <PainelAdm onVoltar={()=>setModo("dts_hub")} cfg={CFG_DTS} />;

      // PT
      if(modo==="pt_hub") return <DocHub titulo="PT" sub="Permissão de Trabalho" onVoltar={()=>setModo("inicio")}
        labelPreencher="Preencher PT" onPreencher={()=>setModo("pt_menu")} onAdmin={()=>setModo("pt_adm")} />;
      if(modo==="pt_menu") return <MenuPT onVoltar={()=>setModo("pt_hub")} onEscolher={(id)=>setModo("pt_"+id)} />;
      if(modo==="pt_quente") return <AppPTQuente onVoltar={()=>setModo("pt_menu")} />;
      if(modo==="pt_eletricidade") return <AppPT desc={PT_DESCRITORES.eletricidade} onVoltar={()=>setModo("pt_menu")} />;
      if(modo==="pt_altura") return <AppPT desc={PT_DESCRITORES.altura} onVoltar={()=>setModo("pt_menu")} />;
      if(modo==="pt_escavacao") return <AppPT desc={PT_DESCRITORES.escavacao} onVoltar={()=>setModo("pt_menu")} />;
      if(modo==="pt_confinado") return <AppPT desc={PT_DESCRITORES.confinado} onVoltar={()=>setModo("pt_menu")} />;
      if(modo==="pt_mergulho") return <AppPT desc={PT_DESCRITORES.mergulho} onVoltar={()=>setModo("pt_menu")} />;
      if(modo==="pt_icamento") return <AppPT desc={PT_DESCRITORES.icamento} onVoltar={()=>setModo("pt_menu")} />;
      if(modo==="pt_adm") return <PainelAdm onVoltar={()=>setModo("pt_hub")} cfg={CFG_PT} />;

      const Card=({cor,titulo,sub,onClick,disabled})=>(
        <button disabled={disabled} onClick={onClick} style={{padding:"20px",fontSize:16,borderRadius:12,border:"none",
          background:disabled?"#eee":cor,color:disabled?"#aaa":"#fff",cursor:disabled?"default":"pointer",fontWeight:600,textAlign:"center"}}>
          {titulo}<br/><span style={{fontSize:12,fontWeight:400,opacity:.85}}>{sub}</span>
        </button>
      );
      return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          <div className="header">
            <h1>Grupo Solution — Segurança</h1>
            <p>Documentos Iguá Saneamento</p>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",gap:14,padding:24,maxWidth:420,margin:"0 auto",width:"100%"}}>
            <p style={{textAlign:"center",color:"#666",fontSize:15,margin:"0 0 4px"}}>Qual documento?</p>
            <Card cor="#185FA5" titulo="DTS" sub="Discussão de Trabalho Seguro" onClick={()=>setModo("dts_hub")} />
            <Card cor="#0C447C" titulo="PT" sub="Permissão de Trabalho" onClick={()=>setModo("pt_hub")} />
            <Card cor="#2E7D5B" titulo="Checklist" sub="Frota e equipamentos" onClick={()=>{ window.location.href="./frota/"; }} />
            <div style={{borderTop:"1px solid #eee",marginTop:8,paddingTop:14,display:"flex",justifyContent:"center"}}>
              <button onClick={()=>setQrApp(true)} style={{background:"none",border:"none",color:"#185FA5",fontSize:13,fontWeight:500,cursor:"pointer"}}>
                ▣ Compartilhar acesso (QR code)
              </button>
            </div>
          </div>
          {qrApp && <QRAppModal onClose={()=>setQrApp(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
  </script>
</body>
</html>
