    function fmtData(d){ const dd=String(d.getDate()).padStart(2,"0"), mm=String(d.getMonth()+1).padStart(2,"0"); return dd+"/"+mm+"/"+d.getFullYear(); }

    // ===== Armazenamento local (IndexedDB) das DTS recentes no aparelho =====
    const DB_NOME="dts_local", STORE="recentes", FILA="pendentes";
    function abrirDB(){
      return new Promise((res,rej)=>{
        const req=indexedDB.open(DB_NOME,2);
        req.onupgradeneeded=()=>{ const db=req.result;
          if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE,{keyPath:"id"});
          if(!db.objectStoreNames.contains(FILA)) db.createObjectStore(FILA,{keyPath:"id"});
        };
        req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error);
      });
    }
    async function salvarLocal(item){ // {id, nome, data, dataISO, bytes}
      try{ const db=await abrirDB(); const tx=db.transaction(STORE,"readwrite"); tx.objectStore(STORE).put(item); return new Promise(r=>{tx.oncomplete=()=>r(true);tx.onerror=()=>r(false);}); }catch(e){ return false; }
    }
    async function listarLocal(){
      try{ const db=await abrirDB(); const tx=db.transaction(STORE,"readonly"); const req=tx.objectStore(STORE).getAll();
        return new Promise(r=>{ req.onsuccess=()=>r(req.result||[]); req.onerror=()=>r([]); }); }catch(e){ return []; }
    }
    // Só os documentos da DTS (exclui PTs). Aceita registros antigos sem 'tipo' cujo nome começa com "DTS".
    async function listarDTSLocal(){
      const todos = await listarLocal();
      return todos.filter(r => r.tipo==="dts" || (!r.tipo && (r.nome||"").startsWith("DTS")));
    }
    async function limparAntigas(){ // remove o que não é de hoje
      try{ const hoje=new Date().toISOString().slice(0,10); const db=await abrirDB();
        const tx=db.transaction(STORE,"readwrite"); const st=tx.objectStore(STORE); const req=st.getAll();
        req.onsuccess=()=>{ (req.result||[]).forEach(it=>{ if((it.dataISO||"").slice(0,10)!==hoje) st.delete(it.id); }); };
      }catch(e){}
    }

    }
    async function filaListar(){

    // --- Modal de QR code para o fiscal ---
    function QRModal({ url, item, onClose }) {
      const boxRef = useRef(null);
      useEffect(()=>{
        if(boxRef.current && window.QRCode){
          boxRef.current.innerHTML="";
          new window.QRCode(boxRef.current, { text:url, width:240, height:240, correctLevel: window.QRCode.CorrectLevel.M });
        }
      },[url]);
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:24,maxWidth:340,width:"100%",textAlign:"center"}}>
            <h3 style={{margin:"0 0 4px",color:"#185FA5"}}>QR code para o fiscal</h3>

            <div ref={boxRef} style={{display:"flex",justifyContent:"center",marginBottom:8}}></div>
            <p style={{fontSize:11,color:"#999",wordBreak:"break-all",margin:"8px 0 16px"}}>{(item&&item.nome)||"DTS"}</p>

    // --- Modal de QR code para compartilhar o acesso ao app ---
    function QRAppModal({ onClose }) {
      const boxRef = useRef(null);
      const appUrl = window.location.origin + window.location.pathname;
      const [copiado,setCopiado]=useState(false);
      useEffect(()=>{
        if(boxRef.current && window.QRCode){
          boxRef.current.innerHTML="";
          new window.QRCode(boxRef.current, { text:appUrl, width:240, height:240, correctLevel: window.QRCode.CorrectLevel.M });
        }
      },[appUrl]);
      const copiar=()=>{
        const done=()=>{ setCopiado(true); setTimeout(()=>setCopiado(false),1800); };
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(appUrl).then(done).catch(done);
        } else { done(); }
      };
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:24,maxWidth:340,width:"100%",textAlign:"center"}}>
            <h3 style={{margin:"0 0 4px",color:"#185FA5"}}>Acesso ao app</h3>
            <p style={{fontSize:13,color:"#666",margin:"0 0 16px"}}>Aponte a câmera do celular para abrir o app. Use para compartilhar o acesso com a equipe.</p>
            <div ref={boxRef} style={{display:"flex",justifyContent:"center",marginBottom:12}}></div>
            <p style={{fontSize:11,color:"#999",wordBreak:"break-all",margin:"0 0 16px"}}>{appUrl}</p>
            <button className="btn btn-light" style={{width:"100%",marginBottom:8}} onClick={copiar}>{copiado?"Link copiado ✓":"Copiar link"}</button>
            <button className="btn btn-blue" style={{width:"100%"}} onClick={onClose}>Fechar</button>
          </div>
        </div>
      );
    }

    // --- Canvas de rubrica ---
    function RubricaModal({ onClose, onSave }) {
      const canvasRef = useRef(null);
      const drawing = useRef(false);
      useEffect(()=>{
        const c=canvasRef.current; const ctx=c.getContext("2d");
        ctx.strokeStyle="#0a1a3a"; ctx.lineWidth=2.2; ctx.lineCap="round"; ctx.lineJoin="round";
      },[]);
      const pos=(e)=>{ const c=canvasRef.current; const r=c.getBoundingClientRect();
        const t=e.touches?e.touches[0]:e; return { x:(t.clientX-r.left)*(c.width/r.width), y:(t.clientY-r.top)*(c.height/r.height) }; };
      const start=(e)=>{ e.preventDefault(); drawing.current=true; const ctx=canvasRef.current.getContext("2d"); const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
      const move=(e)=>{ if(!drawing.current)return; e.preventDefault(); const ctx=canvasRef.current.getContext("2d"); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
      const end=()=>{ drawing.current=false; };
      const limpar=()=>{ const c=canvasRef.current; c.getContext("2d").clearRect(0,0,c.width,c.height); };
      const salvar=()=>{ onSave(canvasRef.current.toDataURL("image/png")); };
      return (<div className="modal-bg" onClick={onClose}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <h3>Rubrica</h3>
          <p style={{fontSize:12,color:"#888",margin:"0 0 8px"}}>Desenhe a rubrica com o dedo</p>
          <canvas ref={canvasRef} width="320" height="120" className="rubrica-canvas" style={{width:"100%",height:120}}
            onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
            onTouchStart={start} onTouchMove={move} onTouchEnd={end}></canvas>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button className="btn btn-light" style={{flex:1}} onClick={limpar}>Limpar</button>
            <button className="btn btn-light" style={{flex:1}} onClick={onClose}>Cancelar</button>
            <button className="btn btn-blue" style={{flex:1}} onClick={salvar}>Salvar</button>
          </div>
        </div>
      </div>);
    }

    function App({ onVoltar }) {
      const agora = useRef(new Date());
      const [numeroOs,setNumeroOs]=useState("");
      const [elaborador,setElaborador]=useState("");
      const [lider,setLider]=useState("");
      const [area,setArea]=useState("");
      const [atividade,setAtividade]=useState(""); // EM BRANCO agora
      const [local,setLocal]=useState("");

      // tipo de equipe: "igua" ou "contratada"; empresa selecionada/digitada
      const CONTRATADAS=["Grupo Solution"];
      const [tipoEquipe,setTipoEquipe]=useState("contratada"); // padrão: contratada
      const [empresa,setEmpresa]=useState("Grupo Solution"); // empresa quando contratada
      const [empresaOutra,setEmpresaOutra]=useState(""); // quando escolhe "Outra"
      const empresaEfetiva = tipoEquipe==="igua" ? "" : (empresa==="__outra__" ? empresaOutra : empresa);

      const [criticas,setCriticas]=useState([]);
      // etapas selecionadas; por etapa, riscos selecionados {riscoNome: {nivel, controle:[], protecao:[], suporte:[]}}
      const [etapasSel,setEtapasSel]=useState({}); // {etapaId:true}
      const [riscoSel,setRiscoSel]=useState({});   // {etapaId__risco: {nivel, c:[], p:[], s:[]}}
      const [etapasOutras,setEtapasOutras]=useState([]); // [{nome,risco,nivel,ctrl,prot,sup}]
      const [riscosManuais,setRiscosManuais]=useState({}); // {etapaId: [{risco,nivel,ctrl,prot,sup}]}
      const [epis,setEpis]=useState([]);
      const [outros,setOutros]=useState({});
      const setOutro=(k,v)=>setOutros(o=>({...o,[k]:v}));

      const [nomeTmp,setNomeTmp]=useState("");
      const [equipe,setEquipe]=useState([]); // [{nome, rubrica}]
      const [rubricaIdx,setRubricaIdx]=useState(null);

      const [toast,setToast]=useState(null);
      const [salvando,setSalvando]=useState(false);
      const [recentes,setRecentes]=useState([]);
      const [pendentes,setPendentes]=useState(0);

      // sincroniza a fila de pendentes com o Supabase
      async function sincronizarPendentes(){
        if(!navigator.onLine) return;
        const fila=await filaListar();
        if(!fila.length){ setPendentes(0); return; }
        let enviadas=0;
        for(const item of fila){
          try{
            // recalcula revisão no momento do envio (mesma OS no mesmo dia)
            let registro=item.registro;
            if(item.osBase && item.dataAtividade){
              try{
                const { data:ex }=await supa.from("dts").select("id").eq("numero_os_base",item.osBase).eq("data_atividade",item.dataAtividade);
                const n=(ex||[]).length;
                const osEf = n>0 ? item.osBase+" Rev."+String(n).padStart(2,"0") : item.osBase;
                registro={...item.registro, numero_os:osEf, numero_os_base:item.osBase};
              }catch(_){}
            }
            const res=await enviarRegistroCompleto(registro, item.colaboradores, item.bytes, item.osNome);
            try{ const locais=await listarLocal(); const loc=locais.find(l=>l.id===item.id);
              if(loc){ loc.pdf_path=res.pdf_path; await salvarLocal(loc); } }catch(_){}
            await filaRemover(item.id);
            enviadas++;
          }catch(e){ /* mantém na fila para a próxima tentativa */ }
        }
        if(enviadas>0) setRecentes(await listarDTSLocal());
        const resto=(await filaListar()).length;
        setPendentes(resto);
        if(enviadas>0) mostraToast(enviadas+" DTS pendente(s) enviada(s) ao administrador.");
      }

      useEffect(()=>{
        (async()=>{ await limparAntigas(); setRecentes(await listarDTSLocal()); setPendentes((await filaListar()).length); await sincronizarPendentes(); })();
        const aoReconectar=()=> sincronizarPendentes();
        window.addEventListener("online", aoReconectar);
        return ()=> window.removeEventListener("online", aoReconectar);
      },[]);

      const baixarRecente=(item)=>{
        try{ const blob=new Blob([item.bytes],{type:"application/pdf"}); const url=URL.createObjectURL(blob);
          const a=document.createElement("a"); a.href=url; a.download=item.nome;
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }catch(e){ mostraToast("Erro ao abrir o arquivo",true); }
      };

      const visualizarRecente=(item)=>{
        try{ const blob=new Blob([item.bytes],{type:"application/pdf"}); const url=URL.createObjectURL(blob);
          window.open(url,"_blank"); setTimeout(()=>URL.revokeObjectURL(url),60000);
        }catch(e){ mostraToast("Erro ao abrir o arquivo",true); }
      };

      // QR code para o fiscal: gera link temporário (24h) do PDF e mostra o QR
      const [qrModal,setQrModal]=useState(null); // {url, item} ou null
      async function gerarQR(item){
        if(!item.pdf_path){ mostraToast("Esta DTS ainda não foi enviada ao servidor. Conecte à internet e tente de novo.",true); return; }
        if(!navigator.onLine){ mostraToast("Sem internet. O QR precisa de conexão para ser gerado.",true); return; }
        try{
          const { data, error }=await supa.storage.from("dts-pdfs").createSignedUrl(item.pdf_path, 60*60*24); // 24h
          if(error||!data){ throw error||new Error("falha ao gerar link"); }
          setQrModal({ url:data.signedUrl, item });
        }catch(e){ mostraToast("Erro ao gerar QR: "+e.message,true); }
      }

      const duplicar=(item)=>{
        const d=item.dados;
        if(!d){ mostraToast("Esta DTS não pode ser duplicada (sem dados salvos).",true); return; }
        setNumeroOs(d.numeroOs||""); setElaborador(d.elaborador||""); setLider(d.lider||"");
        setArea(d.area||""); setAtividade(d.atividade||""); setLocal(d.local||"");
        setTipoEquipe(d.tipoEquipe||"contratada"); setEmpresa(d.empresa||"Grupo Solution"); setEmpresaOutra(d.empresaOutra||"");
        setCriticas(d.criticas||[]); setEtapasSel(d.etapasSel||{}); setRiscoSel(d.riscoSel||{});
        setEtapasOutras(d.etapasOutras||[]); setRiscosManuais(d.riscosManuais||{});
        setEpis(d.epis||[]); setOutros(d.outros||{});
        // equipe volta com os nomes, mas SEM rubrica (cada um precisa rubricar de novo)
        setEquipe((d.equipe||[]).map(m=>({nome:m.nome, rubrica:null})));
        window.scrollTo(0,0);
        mostraToast("DTS duplicada! Revise os dados e colha as rubricas novamente.");
      };

      const mostraToast=(msg,err)=>{ setToast({msg,err}); setTimeout(()=>setToast(null),3000); };

      const toggleEtapa=(id)=> setEtapasSel(s=>{ const n={...s}; if(n[id])delete n[id]; else n[id]=true; return n; });
      const riscoKey=(eid,r)=> eid+"__"+r;
      const toggleRisco=(eid,risco)=> setRiscoSel(s=>{ const k=riscoKey(eid,risco.nome); const n={...s};
        if(n[k]) delete n[k]; else n[k]={nivel:risco.nivel,c:[],p:[],s:[],co:"",po:"",so:""}; return n; });
      const setNivel=(eid,nome,nivel)=> setRiscoSel(s=>({...s,[riscoKey(eid,nome)]:{...s[riscoKey(eid,nome)],nivel}}));
      const toggleBarreira=(eid,nome,tipo,val)=> setRiscoSel(s=>{ const k=riscoKey(eid,nome); const cur=s[k]; const arr=cur[tipo];
        const na = arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]; return {...s,[k]:{...cur,[tipo]:na}}; });
      const setOutroBarreira=(eid,nome,campo,val)=> setRiscoSel(s=>{ const k=riscoKey(eid,nome); return {...s,[k]:{...s[k],[campo]:val}}; });

      const toggleEpi=(v)=> setEpis(a=>a.includes(v)?a.filter(x=>x!==v):[...a,v]);

      // riscos manuais por etapa
      const addRiscoManual=(eid)=> setRiscosManuais(m=>({...m,[eid]:[...(m[eid]||[]),{risco:"",nivel:"M",ctrl:"",prot:"",sup:""}]}));
      const updRiscoManual=(eid,idx,campo,val)=> setRiscosManuais(m=>({...m,[eid]:(m[eid]||[]).map((x,i)=>i===idx?{...x,[campo]:val}:x)}));
      const delRiscoManual=(eid,idx)=> setRiscosManuais(m=>({...m,[eid]:(m[eid]||[]).filter((_,i)=>i!==idx)}));

      const addNome=()=>{ const v=nomeTmp.trim(); if(!v)return; setEquipe([...equipe,{nome:v,rubrica:null}]); setNomeTmp(""); };
      const setRubrica=(idx,dataUrl)=> setEquipe(eq=>eq.map((m,i)=>i===idx?{...m,rubrica:dataUrl}:m));

      // monta as linhas da tabela (1 risco = 1 linha)
      const montarLinhas=()=>{
        const linhas=[];
        ETAPAS.forEach(et=>{
          if(!etapasSel[et.id]) return;
          et.riscos.forEach(r=>{
            const k=riscoKey(et.id,r.nome); const sel=riscoSel[k];
            if(!sel) return;
            const junta=(arr,outro)=> [...arr, ...(outro?[outro]:[])].join(", ");
            linhas.push({ passo:et.nome, risco:r.nome, nivel:sel.nivel,
              ctrl:junta(sel.c,sel.co), prot:junta(sel.p,sel.po), sup:junta(sel.s,sel.so) });
          });
          // riscos manuais adicionados nesta etapa
          (riscosManuais[et.id]||[]).forEach(rm=>{
            if(!rm.risco && !rm.ctrl && !rm.prot && !rm.sup) return;
            linhas.push({ passo:et.nome, risco:rm.risco||"", nivel:rm.nivel||"M",
              ctrl:rm.ctrl||"", prot:rm.prot||"", sup:rm.sup||"" });
          });
        });
        // etapas customizadas (Outros)
        etapasOutras.forEach(e=>{
          if(!e.nome && !e.risco) return;
          linhas.push({ passo:e.nome||"", risco:e.risco||"", nivel:e.nivel||"M",
            ctrl:e.ctrl||"", prot:e.prot||"", sup:e.sup||"" });
        });
        return linhas;
      };

      // monta o objeto do registro da DTS (sem enviar)
      function montarRegistro(){
        const linhas=montarLinhas();
        return {
          numero_os:numeroOs,
          data_atividade: agora.current.toISOString().slice(0,10),
          horario_emissao: fmtHora(agora.current),
          elaborador, lider_frente:lider, area_setor:area, atividade, localizacao:local,
          tipo_equipe:tipoEquipe, empresa:empresaEfetiva,
          atividades_criticas:criticas,
          riscos: linhas.map(l=>({passo:l.passo,nome:l.risco,nivel:l.nivel,controle:l.ctrl,protecao:l.prot,suporte:l.sup})),
          epis,
          barreiras_controle: linhas.map(l=>l.ctrl).filter(Boolean),
          barreiras_protecao: linhas.map(l=>l.prot).filter(Boolean),
          barreiras_suporte: linhas.map(l=>l.sup).filter(Boolean),
          outros, status:"finalizada"
        };
      }

      // envia um registro + colaboradores + PDF ao Supabase. Retorna o id ou lança erro.
      async function enviarRegistroCompleto(registro, colaboradores, bytes, osNome){
        // 1) sobe o PDF PRIMEIRO. Se falhar, lança erro e a DTS vai para a fila (não entra incompleta).
        const nome = "DTS_"+(osNome||"sem_os")+"_"+Date.now()+".pdf";
        const { error:e3 } = await supa.storage.from("dts-pdfs").upload(nome, new Blob([bytes],{type:"application/pdf"}), { upsert:true, contentType:"application/pdf" });
        if(e3) throw e3; // sem PDF garantido, não insere o registro
        // 2) insere o registro JÁ com o pdf_path
        const { data:ins, error } = await supa.from("dts").insert({...registro, pdf_path:nome}).select().single();
        if(error){
          // registro falhou: remove o PDF órfão do Storage para não acumular lixo
          try{ await supa.storage.from("dts-pdfs").remove([nome]); }catch(_){}
          throw error;
        }
        // 3) colaboradores
        if(colaboradores && colaboradores.length){
          const rows=colaboradores.map((nome,i)=>({dts_id:ins.id,nome,ordem:i}));
          const { error:e2 } = await supa.from("dts_colaborador").insert(rows);
          if(e2) throw e2;
        }
        return { id: ins.id, pdf_path: nome };
      }

      async function gerarPDF(osEfetiva){
        const osMostrar = osEfetiva || numeroOs;
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const H=612;
        let templateBytes;
        try{ const resp=await fetch("modelo_dts.pdf"); if(!resp.ok)throw new Error("HTTP "+resp.status); templateBytes=await resp.arrayBuffer(); }
        catch(e){ mostraToast("Não achei o modelo_dts.pdf na pasta do app",true); return; }
        const pdfDoc=await PDFDocument.load(templateBytes);
        const font=await pdfDoc.embedFont(StandardFonts.Helvetica);
        const fontB=await pdfDoc.embedFont(StandardFonts.HelveticaBold);
        const pages=pdfDoc.getPages(); const p1=pages[0];
        const put=(pg,x,top,s,size,bold)=> pg.drawText(String(s==null?"":s),{x,y:H-top,size:size||7,font:bold?fontB:font,color:rgb(0,0,0)});
        // cobre uma área com retângulo branco (para ocultar os tracejados ___/___/___)
        const cobrir=(pg,x,top,w,h)=> pg.drawRectangle({x, y:H-top-h+2, width:w, height:h, color:rgb(1,1,1)});

        // cabeçalho (função reutilizável - usada na p1 e nas páginas de continuação)
        const desenharCabecalho=(pg)=>{
          // Unidade: marca Iguá OU Contratada conforme a escolha
          if(tipoEquipe==="igua"){
            put(pg,78,120.5,"X",8,true); // checkbox Iguá Saneamento
          }else{
            put(pg,178,121,"X",8,true); // checkbox Contratada
            put(pg,295,119,empresaEfetiva,7); // nome da empresa
          }
          cobrir(pg,39,131,98,9);   put(pg,42,137,fmtData(agora.current),8);   // DATA
          cobrir(pg,294,131,45,9);  put(pg,297,137,fmtHora(agora.current),8);  // HORA
          put(pg,380,136,osMostrar,7);
          put(pg,120,152,elaborador,7);
          put(pg,250,169,area,7);
          put(pg,110,186,lider,7);
          put(pg,125,202,atividade,7);
          put(pg,580,203,local,7);
          const cb={ "Escavação":[503,135.5],"Içamento de carga":[573.5,135.5],"Trabalho a quente":[667.6,135.5],
            "Eletricidade":[503,152],"Espaço confinado":[573.5,152],"Trabalho em altura":[667.6,152],"Mergulho":[503,168.7] };
          criticas.forEach(k=>{ if(cb[k]) put(pg,cb[k][0],cb[k][1],"X",8,true); });
          // conserta a borda esquerda que falta no template (entre top~143 e top~159)
          pg.drawLine({ start:{x:17.9, y:H-142}, end:{x:17.9, y:H-159.5}, thickness:1, color:rgb(0,0,0) });
        };
        desenharCabecalho(p1);

        // tabela - texto quebra em linhas, ancorado na GRADE REAL do formulário
        const colPasso=22,colRisco=188,colNivel=308,colCtrl=352,colProt=487,colSup=623;
        const colW={passo:158,risco:92,ctrl:128,prot:130,sup:145}; // largura util de cada coluna (pt)
        const GRID_TOP=253.3;      // topo da 1a linha de dados (medido no formulário)
        const GRID_H=12.85;        // altura real de cada linha da grade
        const GRID_N=20;           // total de linhas disponiveis
        const fsz=6;
        const baseY=8.6;           // deslocamento do texto dentro da linha da grade (centraliza)

        // quebra texto em linhas que cabem em maxWidth (Helvetica fsz)
        const wrap=(s,maxWidth)=>{
          if(!s) return [""];
          const words=String(s).split(/\s+/); const out=[]; let cur="";
          words.forEach(w=>{
            const test=cur?cur+" "+w:w;
            if(font.widthOfTextAtSize(test,fsz)<=maxWidth) cur=test;
            else { if(cur)out.push(cur);
              if(font.widthOfTextAtSize(w,fsz)>maxWidth){ let part="";
                for(const ch of w){ if(font.widthOfTextAtSize(part+ch,fsz)<=maxWidth)part+=ch; else {out.push(part);part=ch;} }
                cur=part;
              } else cur=w; }
          });
          if(cur)out.push(cur);
          return out.length?out:[""];
        };

        const linhas=montarLinhas();
        if(epis.length) linhas.push({passo:"",risco:"",nivel:"",ctrl:"",prot:"EPIs em uso: "+epis.join(", "),sup:""});
        if(outros.epis) linhas.push({passo:"",risco:"",nivel:"",ctrl:"",prot:"EPIs (outros): "+outros.epis,sup:""});

        // Suporte a PÁGINAS DE CONTINUAÇÃO: quando a tabela passa de GRID_N linhas,
        // inserimos uma cópia da página 1 (grade vazia) entre a tabela e a pág. de assinaturas.
        // Guardamos o índice onde inserir a próxima continuação (logo antes da pág. de assinaturas).
        let paginaTabela=p1;            // página onde estamos desenhando a tabela
        let gridRow=0;                  // linha atual da grade na página corrente
        let idxInsercao=1;              // posição para inserir a próxima continuação (antes da pág 2 original)

        async function novaPaginaContinuacao(){
          // copia a página 1 do PRÓPRIO documento (já tem a grade); como ainda não escrevemos
          // texto fora da p1, copiamos do template recarregado para vir limpa.
          const tpl=await PDFDocument.load(templateBytes);
          const [pg]=await pdfDoc.copyPages(tpl,[0]);
          pdfDoc.insertPage(idxInsercao, pg);
          idxInsercao++;                // a próxima continuação vai depois desta
          gridRow=0;
          desenharCabecalho(pg);        // repete OS, data, setor, endereço, etc.
          return pg;
        }

        for(let li=0; li<linhas.length; li++){
          const ln=linhas[li];
          const cells={
            passo:wrap(ln.passo,colW.passo), risco:wrap(ln.risco,colW.risco),
            ctrl:wrap(ln.ctrl,colW.ctrl), prot:wrap(ln.prot,colW.prot), sup:wrap(ln.sup,colW.sup)
          };
          const nSub=Math.max(cells.passo.length,cells.risco.length,cells.ctrl.length,cells.prot.length,cells.sup.length,1);
          if(gridRow+nSub>GRID_N){
            // enche a página atual -> cria continuação
            paginaTabela=await novaPaginaContinuacao();
          }
          const pg=paginaTabela;
          const drawCol=(arr,x)=> arr.forEach((t,k)=> put(pg,x,GRID_TOP+(gridRow+k)*GRID_H+baseY,t,fsz));
          drawCol(cells.passo,colPasso); drawCol(cells.risco,colRisco);
          if(ln.nivel) put(pg,colNivel,GRID_TOP+gridRow*GRID_H+baseY,ln.nivel,fsz,true);
          drawCol(cells.ctrl,colCtrl); drawCol(cells.prot,colProt); drawCol(cells.sup,colSup);
          gridRow += nSub;
        }
        // a página de assinaturas é sempre a ÚLTIMA do documento
        const p2=pdfDoc.getPages()[pdfDoc.getPageCount()-1];
        // grade real pág2: 1a linha de nomes top~311, altura ~13.9pt
        const NOME_TOP=311, NOME_H=13.9, colNome=22;
        const baseNome=9.5;        // base de texto dentro da linha
        const assinCentro=220;     // centro horizontal da 1a coluna de assinatura
        // DATA no cabeçalho da 1a coluna de assinaturas (cobre o ___/___/___ circulado)
        const dataDts=fmtData(agora.current);
        cobrir(p2,196,301,46,9);
        const dwc=font.widthOfTextAtSize(dataDts,7);
        put(p2,assinCentro-dwc/2,307,dataDts,7);
        for(let i=0;i<Math.min(equipe.length,9);i++){
          const m=equipe[i];
          const rowTop=NOME_TOP + i*NOME_H;       // topo da linha da grade
          put(p2,colNome,rowTop+baseNome,m.nome,7); // nome inteiro, centrado na linha
          // rubrica centralizada na 1a coluna de assinatura, na mesma linha do nome
          if(m.rubrica){
            try{ const png=await pdfDoc.embedPng(m.rubrica);
              const rw=48, rh=11;
              const yBottom = H - (rowTop + NOME_H) + (NOME_H-rh)/2; // centra verticalmente na célula
              p2.drawImage(png,{x:assinCentro-rw/2, y:yBottom, width:rw, height:rh}); }catch(_){}
          }
        }

        const bytes=await pdfDoc.save();
        const blob=new Blob([bytes],{type:"application/pdf"}); const url=URL.createObjectURL(blob);
        const a=document.createElement("a"); a.href=url; a.download="DTS_"+(numeroOs||"sem_os")+".pdf";
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        return bytes; // devolve para upload ao Storage
      }

      async function salvarEGerar(){
        // validação: campos obrigatórios
        if(!numeroOs.trim()){ mostraToast("Preencha o Nº da O.S.",true); return; }
        if(tipoEquipe==="contratada" && !empresaEfetiva.trim()){ mostraToast("Informe o nome da empresa contratada.",true); return; }
        if(!local.trim()){ mostraToast("Preencha a Localização do trabalho (endereço).",true); return; }
        if(!equipe.length){ mostraToast("Adicione pelo menos um colaborador na equipe.",true); return; }
        const semRubrica=equipe.filter(m=>!m.rubrica).map(m=>m.nome);
        if(semRubrica.length){ mostraToast("Falta a rubrica de: "+semRubrica.join(", "),true); return; }

        // validação: nenhum risco pode ficar sem barreira alguma
        const linhasV=montarLinhas();
        const semBarreira=linhasV.filter(l=> l.risco && !l.ctrl && !l.prot && !l.sup).map(l=>l.risco);
        if(semBarreira.length){ mostraToast("Risco sem barreira: "+semBarreira.join("; ")+". Defina ao menos uma barreira.",true); return; }

        setSalvando(true);
        try{
          const hoje=agora.current.toISOString().slice(0,10);
          const osBase=numeroOs.trim();

          // 1) detecta revisão: quantas DTS dessa OS já existem HOJE? (só dá p/ consultar online)
          let osEfetiva=osBase;
          let online=navigator.onLine;
          if(online){
            try{
              const { data:existentes }=await supa.from("dts").select("id").eq("numero_os_base",osBase).eq("data_atividade",hoje);
              const n=(existentes||[]).length;
              if(n>0) osEfetiva = osBase+" Rev."+String(n).padStart(2,"0");
            }catch(e){ /* se a consulta falhar, segue sem rev */ }
          }

          // 2) gera o PDF com o número efetivo (com Rev se for o caso)
          const bytes=await gerarPDF(osEfetiva);
          if(!bytes){ setSalvando(false); return; }

          const localId="local_"+Date.now();
          const registro={...montarRegistro(), numero_os:osEfetiva, numero_os_base:osBase};
          const colaboradores=equipe.map(m=>m.nome);
          const osNome=osEfetiva.replace(/[^\w.-]+/g,"_")||"sem_os";

          // 3) guarda cópia local "DTSs de hoje"
          const dados={ numeroOs, elaborador, lider, area, atividade, local,
            tipoEquipe, empresa, empresaOutra,
            criticas, etapasSel, riscoSel, etapasOutras, riscosManuais, epis, outros,
            equipe: colaboradores.map(nome=>({nome})) };
          await salvarLocal({ id:localId, tipo:"dts", nome:"DTS_"+osNome+".pdf", data:fmtData(agora.current),
            dataISO:new Date().toISOString(), atividade, bytes, dados });
          setRecentes(await listarDTSLocal());

          // 4) envia agora; se offline ou falhar, enfileira (a revisão será recalculada ao sincronizar)
          if(online){
            try{
              const res=await enviarRegistroCompleto(registro, colaboradores, bytes, osNome);
              await salvarLocal({ id:localId, tipo:"dts", nome:"DTS_"+osNome+".pdf", data:fmtData(agora.current),
                dataISO:new Date().toISOString(), atividade, bytes, dados, pdf_path:res.pdf_path });
              setRecentes(await listarDTSLocal());
              mostraToast(osEfetiva!==osBase ? ("DTS enviada como "+osEfetiva+" (revisão).") : "DTS salva e enviada com sucesso!");
            }catch(e){
              await filaAdd({ id:localId, registro:{...registro,numero_os:osBase,numero_os_base:osBase}, colaboradores, osNome:osBase, bytes, osBase, dataAtividade:hoje });
              setPendentes((await filaListar()).length);
              mostraToast("Sem conexão estável. DTS salva e será enviada quando reconectar.");
            }
          }else{
            await filaAdd({ id:localId, registro:{...registro,numero_os:osBase,numero_os_base:osBase}, colaboradores, osNome:osBase, bytes, osBase, dataAtividade:hoje });
            setPendentes((await filaListar()).length);
            mostraToast("Offline: DTS salva. Será enviada automaticamente ao reconectar.");
          }
        }catch(e){ mostraToast("Erro: "+e.message,true); }
        finally{ setSalvando(false); }
      }

            {recentes.map(item=>(

    // ============================================================
    // PAINEL ADM (cortina de senha) - lista DTS por período e baixa PDFs
    // ============================================================
    // SENHA: troque o valor abaixo pela senha que você quiser.
    // Aviso: isto é uma "cortina" visual, não proteção forte.
    const ADM_SENHA = "GS@2026";

    // cfg define qual documento este painel administra. Padrão = DTS (comportamento original).
    const CFG_DTS={ tabela:"dts", colab:"dts_colaborador", fk:"dts_id", rotulo:"DTS", prefixo:"DTS",
      colTitulo:"atividade", colLocal:"localizacao", colLider:"lider_frente",
      select:"id,created_at,numero_os,atividade,localizacao,lider_frente,pdf_path,data_atividade" };
    const CFG_PT_QUENTE={ tabela:"pt_quente", colab:"pt_quente_colaborador", fk:"pt_id", rotulo:"PT a Quente", prefixo:"PT_quente",
      colTitulo:"descricao_trabalho", colLocal:"local_trabalho", colLider:"lider_atividade",
      select:"id,created_at,numero_os,descricao_trabalho,local_trabalho,lider_atividade,pdf_path,data_atividade" };
    // Tabela única de PT: admin filtra por tipo + data. filtroTipo habilita o seletor de tipo.
    const PT_TIPOS=[["","Todas"],["quente","A Quente"],["eletricidade","Eletricidade"],["altura","Altura"],["escavacao","Escavação"],["confinado","Espaço Confinado"],["mergulho","Mergulho"],["icamento","Içamento"]];
    const CFG_PT={ tabela:"pt", colab:"pt_colaborador", fk:"pt_id", rotulo:"PT", prefixo:"PT",
      colTitulo:"descricao_trabalho", colLocal:"local_trabalho", colLider:"lider_atividade",
      filtroTipo:true, tipos:PT_TIPOS,
      select:"id,created_at,tipo,numero_os,descricao_trabalho,local_trabalho,lider_atividade,pdf_path,data_atividade" };

    function PainelAdm({ onVoltar, cfg=CFG_DTS }) {
      const [ok,setOk]=useState(false);
      const [senha,setSenha]=useState("");
      const [de,setDe]=useState("");
      const [ate,setAte]=useState("");
      const [tipoFiltro,setTipoFiltro]=useState("");
      const [lista,setLista]=useState([]);
      const [carregando,setCarregando]=useState(false);
      const [msg,setMsg]=useState("");

      async function buscar(){
        setCarregando(true); setMsg("");
        try{
          let q=supa.from(cfg.tabela).select(cfg.select).order("created_at",{ascending:false});
          if(de) q=q.gte("data_atividade",de);
          if(ate) q=q.lte("data_atividade",ate);
          if(cfg.filtroTipo && tipoFiltro) q=q.eq("tipo",tipoFiltro);
          const { data, error }=await q;
          if(error) throw error;
          setLista(data||[]);
          if(!data || !data.length) setMsg("Nenhum registro encontrado no período.");
        }catch(e){ setMsg("Erro: "+e.message); }
        finally{ setCarregando(false); }
      }

      async function baixar(item){
        if(!item.pdf_path){ alert("Este documento não tem PDF salvo."); return; }
        try{
          const { data, error }=await supa.storage.from("dts-pdfs").download(item.pdf_path);
          if(error) throw error;
          const url=URL.createObjectURL(data);
          const a=document.createElement("a"); a.href=url; a.download=item.pdf_path;
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }catch(e){ alert("Erro ao baixar: "+e.message); }
      }

      async function visualizar(item){
        if(!item.pdf_path){ alert("Este documento não tem PDF salvo."); return; }
        try{
          const { data, error }=await supa.storage.from("dts-pdfs").download(item.pdf_path);
          if(error) throw error;
          const url=URL.createObjectURL(data);
          window.open(url, "_blank"); // abre o PDF numa nova aba
          // libera a memória depois de um tempo (a aba já carregou o arquivo)
          setTimeout(()=>URL.revokeObjectURL(url), 60000);
        }catch(e){ alert("Erro ao abrir: "+e.message); }
      }

      async function baixarTodos(){
        const comPdf=lista.filter(i=>i.pdf_path);
        if(!comPdf.length){ alert("Nenhum PDF disponível para baixar."); return; }
        setCarregando(true); setMsg("Unificando "+comPdf.length+" PDFs...");
        try{
          const { PDFDocument }=PDFLib;
          const unificado=await PDFDocument.create();
          let ok=0, falhas=0;
          for(const item of comPdf){
            try{
              const { data, error }=await supa.storage.from("dts-pdfs").download(item.pdf_path);
              if(error) throw error;
              const bytes=await data.arrayBuffer();
              const doc=await PDFDocument.load(bytes);
              const paginas=await unificado.copyPages(doc, doc.getPageIndices());
              paginas.forEach(p=>unificado.addPage(p));
              ok++;
            }catch(e){ falhas++; console.warn("falha em",item.pdf_path,e.message); }
          }
          if(!ok){ setMsg("Não foi possível baixar nenhum PDF."); setCarregando(false); return; }
          const bytesFinal=await unificado.save();
          const blob=new Blob([bytesFinal],{type:"application/pdf"});
          const url=URL.createObjectURL(blob);
          // nome do arquivo com o período
          const periodo=(de||"inicio")+"_a_"+(ate||"hoje");
          const a=document.createElement("a"); a.href=url; a.download=cfg.prefixo+"_periodo_"+periodo+".pdf";
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
          setMsg("PDF unificado gerado com "+ok+" "+cfg.rotulo+(falhas?(" ("+falhas+" falharam)"):"")+".");
        }catch(e){ setMsg("Erro ao unificar: "+e.message); }
        finally{ setCarregando(false); }
      }

      // ---- EXCLUSÃO por período (com confirmação por senha) ----
      async function excluirPeriodo(){
        if(!de || !ate){ alert("Para excluir, defina o período (data De e Até)."); return; }
        const conf = window.prompt("ATENÇÃO: esta ação é PERMANENTE.\n\nVai excluir TODOS os registros de "+cfg.rotulo+" de "+de+" até "+ate+" (registros e PDFs).\n\nDigite a senha do administrador para confirmar:");
        if(conf===null) return; // cancelou
        if(conf!==ADM_SENHA){ alert("Senha incorreta. Nada foi excluído."); return; }
        setCarregando(true); setMsg("");
        try{
          // 1) busca as DTS do período (para pegar ids e pdf_paths)
          let q=supa.from(cfg.tabela).select("id,pdf_path");
          if(de) q=q.gte("data_atividade",de);
          if(ate) q=q.lte("data_atividade",ate);
          const { data:alvos, error:e0 }=await q;
          if(e0) throw e0;
          if(!alvos || !alvos.length){ setMsg("Nenhum registro no período para excluir."); setCarregando(false); return; }
          const ids=alvos.map(a=>a.id);
          const paths=alvos.map(a=>a.pdf_path).filter(Boolean);
          // 2) apaga os PDFs do Storage
          if(paths.length){ const { error:eS }=await supa.storage.from("dts-pdfs").remove(paths); if(eS) console.warn("storage remove:",eS.message); }
          // 3) apaga colaboradores vinculados (FK) e depois as DTS
          await supa.from(cfg.colab).delete().in(cfg.fk,ids);
          const { error:eD }=await supa.from(cfg.tabela).delete().in("id",ids);
          if(eD) throw eD;
          setMsg("Excluídos "+ids.length+" registros do período.");
          setLista([]);
        }catch(e){ setMsg("Erro ao excluir: "+e.message); }
        finally{ setCarregando(false); }
      }

      async function excluirUma(item){
        const desc=((item[cfg.colTitulo])||cfg.rotulo)+" — OS "+(item.numero_os||"-");
        const conf=window.prompt("Excluir PERMANENTEMENTE este registro?\n\n"+desc+"\n\nDigite a senha do administrador para confirmar:");
        if(conf===null) return;
        if(conf!==ADM_SENHA){ alert("Senha incorreta. Nada foi excluído."); return; }
        setCarregando(true); setMsg("");
        try{
          if(item.pdf_path){ const { error:eS }=await supa.storage.from("dts-pdfs").remove([item.pdf_path]); if(eS) console.warn("storage remove:",eS.message); }
          await supa.from(cfg.colab).delete().eq(cfg.fk,item.id);
          const { error:eD }=await supa.from(cfg.tabela).delete().eq("id",item.id);
          if(eD) throw eD;
          setLista(l=>l.filter(x=>x.id!==item.id));
          setMsg("Registro excluído.");
        }catch(e){ setMsg("Erro ao excluir: "+e.message); }
        finally{ setCarregando(false); }
      }

      async function anexarPdf(item, file){
        if(!file) return;
        if(file.type!=="application/pdf" && !file.name.toLowerCase().endsWith(".pdf")){ alert("Selecione um arquivo PDF."); return; }
        setCarregando(true); setMsg("");
        try{
          const bytes=await file.arrayBuffer();
          const nome=(cfg.tabela==="dts"?"":"pt/")+cfg.prefixo+"_"+(item.numero_os||"sem_os")+"_"+item.id+".pdf";
          const { error:eS }=await supa.storage.from("dts-pdfs").upload(nome, new Blob([bytes],{type:"application/pdf"}), { upsert:true, contentType:"application/pdf" });
          if(eS) throw eS;
          const { error:eU }=await supa.from(cfg.tabela).update({ pdf_path:nome }).eq("id", item.id);
          if(eU) throw eU;
          setLista(l=>l.map(x=>x.id===item.id?{...x,pdf_path:nome}:x));
          setMsg("PDF anexado ao registro de OS "+(item.numero_os||"-")+".");
        }catch(e){ setMsg("Erro ao anexar: "+e.message); }
        finally{ setCarregando(false); }
      }

      if(!ok){
        return (<div style={{maxWidth:360,margin:"60px auto",padding:24,background:"#fff",borderRadius:12}}>
          <h2 style={{color:"#185FA5",marginTop:0}}>Painel administrativo</h2>
          <p style={{fontSize:13,color:"#666"}}>Digite a senha para acessar os relatórios.</p>
          <input type="password" value={senha} onChange={e=>setSenha(e.target.value)} placeholder="Senha"
            onKeyDown={e=>e.key==="Enter"&&(senha===ADM_SENHA?setOk(true):setMsg("Senha incorreta"))}
            style={{width:"100%",padding:10,fontSize:15,border:"1px solid #ccc",borderRadius:8,marginBottom:10}} />
          <button className="btn btn-blue" style={{width:"100%"}}
            onClick={()=> senha===ADM_SENHA ? setOk(true) : setMsg("Senha incorreta")}>Entrar</button>
          {msg && <p style={{color:"#A32D2D",fontSize:13}}>{msg}</p>}
          <p style={{fontSize:12,color:"#999",marginTop:16}}><a onClick={onVoltar} style={{color:"#185FA5",cursor:"pointer"}}>← Voltar ao início</a></p>
        </div>);
      }

      return (<div style={{maxWidth:760,margin:"0 auto",padding:16,background:"#fff",minHeight:"100vh"}}>
        <div className="header" style={{borderRadius:10}}>
          <h1>Painel administrativo — {cfg.rotulo}</h1>
          <p>Grupo Solution · relatórios por período</p>
        </div>
        <div style={{padding:"16px 0"}}>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
            <div><label>De (data)</label><input type="date" value={de} onChange={e=>setDe(e.target.value)} /></div>
            <div><label>Até (data)</label><input type="date" value={ate} onChange={e=>setAte(e.target.value)} /></div>
            {cfg.filtroTipo && (
              <div><label>Tipo de PT</label>
                <select value={tipoFiltro} onChange={e=>setTipoFiltro(e.target.value)} style={{padding:9,fontSize:14,border:"1px solid #ccc",borderRadius:8,background:"#fff"}}>
                  {cfg.tipos.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
            )}
            <button className="btn btn-blue" onClick={buscar} disabled={carregando}>{carregando?"Buscando...":"Buscar"}</button>
            {lista.length>0 && <button className="btn btn-light" onClick={baixarTodos}>Baixar todos (PDF único)</button>}
            <button onClick={excluirPeriodo} disabled={carregando}
              style={{padding:"11px 16px",borderRadius:8,border:"1px solid #A32D2D",background:"#fff",color:"#A32D2D",fontSize:14,fontWeight:600,cursor:"pointer"}}>
              Excluir período
            </button>
          </div>
          <p style={{fontSize:12,color:"#999",margin:"8px 0 0"}}>A exclusão remove os registros e os PDFs do período definido em "De/Até". Pede a senha do administrador para confirmar e é permanente.</p>
          {msg && <p style={{color:"#666",fontSize:13}}>{msg}</p>}
          <div style={{marginTop:16}}>
            {lista.map(item=>(
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",border:"1px solid #eee",borderRadius:8,marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:500}}>{item[cfg.colTitulo]||"(sem descrição)"} — OS {item.numero_os||"-"}</div>
                  <div style={{fontSize:12,color:"#888"}}>{item.data_atividade||item.created_at?.slice(0,10)} · {item[cfg.colLocal]||"-"} · {item[cfg.colLider]||"-"}</div>
                </div>
                {item.pdf_path
                  ? <React.Fragment>
                      <button className="btn btn-light" style={{fontSize:13,padding:"7px 12px"}} onClick={()=>visualizar(item)}>Visualizar</button>
                      <button className="btn btn-light" style={{fontSize:13,padding:"7px 12px"}} onClick={()=>baixar(item)}>Baixar PDF</button>
                    </React.Fragment>
                  : <label className="btn btn-light" style={{fontSize:13,padding:"7px 12px",cursor:"pointer"}}>
                      Anexar PDF
                      <input type="file" accept="application/pdf" style={{display:"none"}} onChange={e=>{ const f=e.target.files&&e.target.files[0]; e.target.value=""; anexarPdf(item,f); }} />
                    </label>
                }
                <button style={{fontSize:13,padding:"7px 10px",borderRadius:8,border:"1px solid #A32D2D",background:"#fff",color:"#A32D2D",cursor:"pointer"}} onClick={()=>excluirUma(item)} title="Excluir este registro">Excluir</button>
              </div>
            ))}
          </div>
        </div>
        <p style={{fontSize:12,color:"#999"}}><a onClick={onVoltar} style={{color:"#185FA5",cursor:"pointer"}}>← Voltar ao início</a></p>
      </div>);
    }

    // ============================================================
    // PT A QUENTE (FO-COR-SEG-033)
    // ============================================================
    const PT_QUENTE_ITENS = [
      "Foi realizada a reunião pré trabalho discutindo com todos os colaboradores, os riscos e as barreiras de segurança?",
      "Foram preenchidas todas as documentações necessárias como DTS, checklists de máquinas/equipamentos, veículos, acessórios, entre outros?",
      "As condições climáticas estão favoráveis para realização da atividade de içamento e movimentação de carga (ausência de chuva, tempestades, raios e ventos fortes)?",
      "Os líquidos e materiais inflamáveis estão afastados a uma distância segura ou foram removidos da atividade?",
      "O local está isolado e sinalizado?",
      "Há um biombo para proteção dos trabalhadores ao redor, quanto a radiação não ionizante (luz) proveniente da solda?",
      "Há algum sistema de exaustão para os fumos metálicos (fumaça) provenientes da solda?",
      "Há disponível um extintor para atividade ou sistema de combate a incêndio próximo (hidrante), que consiga alcançar a atividade?",
      "Para solda oxiacetilênica, os cilindros de oxigênio e acetileno estão amarrados e protegidos?",
      "Todos os componentes do equipamento de solda como mangueira, válvula corta chama, conexões, manômetros, entre outros estão em bom estado de uso e funcionamento (ausência de danos materiais)?",
      "Os cabos de energia (extensão, tomadas, plugs) estão adequados, e sem fiação exposta?",
      "O cabo terra está em bom estado de uso e funcionamento para atividade?",
      "O alicate de solda está em bom estado de funcionamento e sem trincas ou rachaduras?",
      "Todos os colaboradores possuem os EPIs necessários para execução da atividade (avental de raspa, luva de raspa, máscara de solda, máscara PFF2/PFF3, óculos de proteção, calçado de segurança, perneira de raspa, mangote de raspa e touca de raspa)?",
      "O local está limpo (sem presença de umidade ou poeira)?"
    ];

    function AppPTQuente({ onVoltar }) {
      const LC = LIMITES_CAB.quente || {}; // limites de caracteres do cabeçalho (PT a Quente)
      const agora = useRef(new Date());
      const [numeroOs,setNumeroOs]=useState("");
      const [tipoEquipe,setTipoEquipe]=useState("contratada");
      const CONTRATADAS=["Grupo Solution"];
      const [empresa,setEmpresa]=useState("Grupo Solution");
      const [empresaOutra,setEmpresaOutra]=useState("");
      const empresaEfetiva = tipoEquipe==="igua" ? "" : (empresa==="__outra__" ? empresaOutra : empresa);
      const [setor,setSetor]=useState("");
      const [local,setLocal]=useState("");
      const [lider,setLider]=useState("");
      const [descricao,setDescricao]=useState("");
      const [turno,setTurno]=useState("Manhã");

      // avaliação: array de {v:'SIM'|'NÃO'|'NA'|null, obs:''}
      const [aval,setAval]=useState(PT_QUENTE_ITENS.map(()=>({v:null,obs:""})));
      const [segura,setSegura]=useState(null); // 'SIM'|'NÃO'
      const [ciente,setCiente]=useState(false);

      const [emissorNome,setEmissorNome]=useState("");
      const [emissorArea,setEmissorArea]=useState("");
      const [verifNome,setVerifNome]=useState("");
      const [verifArea,setVerifArea]=useState("");

      const [nomeTmp,setNomeTmp]=useState("");
      const [equipe,setEquipe]=useState([]); // {nome, rubrica}
      const [rubricaIdx,setRubricaIdx]=useState(null);

      const [toast,setToast]=useState(null);
      const [salvando,setSalvando]=useState(false);
      const [recentes,setRecentes]=useState([]);

      const mostraToast=(msg,err)=>{ setToast({msg,err}); setTimeout(()=>setToast(null),3000); };
      const setItem=(i,campo,val)=>setAval(a=>a.map((x,j)=>j===i?{...x,[campo]:val}:x));
      const addNome=()=>{ const v=nomeTmp.trim(); if(!v)return; setEquipe([...equipe,{nome:v,rubrica:null}]); setNomeTmp(""); };
      const setRubrica=(idx,d)=>setEquipe(eq=>eq.map((m,i)=>i===idx?{...m,rubrica:d}:m));

      useEffect(()=>{ (async()=>{ await limparAntigas(); setRecentes((await listarLocal()).filter(r=>(r.tipo==="pt_quente"))); })(); },[]);

      async function gerarPDF(osEfetiva){
        const osMostrar=osEfetiva||numeroOs;
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const H=841.68;
        let tpl;
        try{ const r=await fetch("modelo_pt_quente.pdf"); if(!r.ok)throw new Error("HTTP "+r.status); tpl=await r.arrayBuffer(); }
        catch(e){ mostraToast("Não achei o modelo_pt_quente.pdf na pasta do app",true); return null; }
        const doc=await PDFDocument.load(tpl);
        const font=await doc.embedFont(StandardFonts.Helvetica);
        const fontB=await doc.embedFont(StandardFonts.HelveticaBold);
        const pg=doc.getPages()[0];
        const put=(x,top,s,size,bold)=>pg.drawText(String(s==null?"":s),{x,y:H-top,size:size||7,font:bold?fontB:font,color:rgb(0,0,0)});
        const X=(xTop,top)=>pg.drawText("X",{x:xTop,y:H-top,size:8,font:fontB,color:rgb(0,0,0)});
        const center=(cx,top,s,size)=>{ const w=font.widthOfTextAtSize(String(s),size||7); put(cx-w/2,top,s,size); };

        // cabeçalho
        if(tipoEquipe==="igua"){ X(44.5,65.6); } else { X(75.5,65.6); put(178,66.9,empresaEfetiva); }
        put(273,54.1,setor); put(90,79.6,local); put(305,79.6,lider);
        put(472,77.3,osMostrar); put(152,90.1,descricao);

        // 15 itens
        const paren_y=[167.4,184.5,201.5,214.3,227.1,239.9,252.7,265.5,278.3,295.4,312.4,325.2,338.0,357.2,376.4];
        const COL={'SIM':341.6,'NÃO':366.0,'NA':391.8};
        aval.forEach((it,i)=>{ if(it.v && COL[it.v]!=null) X(COL[it.v],paren_y[i]);
          if(it.obs) put(438,paren_y[i],it.obs,6); });
        if(segura==="SIM") X(345.4,394.1); else if(segura==="NÃO") X(376.0,394.1);
        if(ciente) X(266.2,455.1);

        // emissão
        center(141.9,525.5,fmtData(agora.current)); center(308.0,525.5,fmtHora(agora.current)); center(465.5,525.5,turno);

        // trabalhadores: nome ao lado do rótulo, rubrica centralizada na célula ASSINATURA
        // linhas da grade (topo): 545,562,579,596,613 ; altura ~17pt
        const rowTopY=[545.0,562.0,579.1,596.1,613.1];
        const ROW_H=17.0;
        // baseline do nome ~ meio da linha + um pouco: topo+12
        // células de assinatura: ESQ x 249.2-323.5 (centro 286.4) ; DIR x 496.8-564.1 (centro 530.5)
        const sigCenter=[286.4,530.5];
        const nomeX=[78,367];
        for(let i=0;i<Math.min(equipe.length,10);i++){
          const m=equipe[i];
          const col=i<5?0:1;
          const topo=rowTopY[i%5];
          put(nomeX[col], topo+11.5, m.nome, 6.5);        // nome alinhado na baseline da linha
          if(m.rubrica){ try{ const png=await doc.embedPng(m.rubrica);
            // conter dentro da célula: max 66pt largura, max 13pt altura, mantendo proporção
            const maxW=66, maxH=13; const ar=png.width/png.height;
            let rw=maxW, rh=rw/ar; if(rh>maxH){ rh=maxH; rw=rh*ar; }
            const cx=sigCenter[col], cyTop=topo+(ROW_H-rh)/2;   // centraliza H e V
            pg.drawImage(png,{x:cx-rw/2, y:H-cyTop-rh, width:rw, height:rh}); }catch(_){}
          }
        }
        // emissor / verificador — nome e área centralizados nas colunas
        // NOME col: x 34.6-? ; ÁREA col centro ~ (usa put simples alinhado)
        put(120,658.2,emissorNome); center(371.8,658.2,emissorArea,6.5);
        put(120,675.2,verifNome); center(371.8,675.2,verifArea,6.5);

        const bytes=await doc.save();
        const blob=new Blob([bytes],{type:"application/pdf"}); const url=URL.createObjectURL(blob);
        const a=document.createElement("a"); a.href=url; a.download="PT_quente_"+(numeroOs||"sem_os")+".pdf";
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        return bytes;
      }

      function montarRegistro(){
        return {
          numero_os:numeroOs, data_atividade:agora.current.toISOString().slice(0,10),
          horario_emissao:fmtHora(agora.current), turno,
          tipo:"quente", tipo_equipe:tipoEquipe, empresa:empresaEfetiva, setor,
          local_trabalho:local, lider_atividade:lider, descricao_trabalho:descricao,
          avaliacao: aval.map((x,i)=>({item:i+1, resposta:x.v, obs:x.obs})),
          atividade_segura:segura, ciente,
          especificos:{}, emissor_nome:emissorNome, emissor_area:emissorArea,
          verificador_nome:verifNome, verificador_area:verifArea,
          status:"finalizada"
        };
      }

      async function enviarPT(registro, colaboradores, bytes, osNome){
        const nome="pt/PT_quente_"+(osNome||"sem_os")+"_"+Date.now()+".pdf";
        const { error:e3 }=await supa.storage.from("dts-pdfs").upload(nome, new Blob([bytes],{type:"application/pdf"}), {upsert:true,contentType:"application/pdf"});
        if(e3) throw e3;
        const { data:ins, error }=await supa.from("pt").insert({...registro, pdf_path:nome}).select().single();
        if(error){ try{ await supa.storage.from("dts-pdfs").remove([nome]); }catch(_){} throw error; }
        if(colaboradores && colaboradores.length){
          const rows=colaboradores.map((nome,i)=>({pt_id:ins.id,nome,ordem:i}));
          const { error:e2 }=await supa.from("pt_colaborador").insert(rows); if(e2) throw e2;
        }
        return { id:ins.id, pdf_path:nome };
      }

      async function salvarEGerar(){
        if(!numeroOs.trim()){ mostraToast("Preencha o Nº da O.S (TOA).",true); return; }
        if(tipoEquipe==="contratada" && !empresaEfetiva.trim()){ mostraToast("Informe a empresa contratada.",true); return; }
        if(!local.trim()){ mostraToast("Preencha o Local do Trabalho.",true); return; }
        const semResp=aval.map((x,i)=>x.v?null:i+1).filter(Boolean);
        if(semResp.length){ mostraToast("Responda os itens: "+semResp.join(", "),true); return; }
        if(!segura){ mostraToast("Marque se a atividade está segura para ser realizada.",true); return; }
        if(!ciente){ mostraToast("Marque o campo \"Sim, estou ciente\" para continuar.",true); return; }
        if(!equipe.length){ mostraToast("Adicione pelo menos um trabalhador.",true); return; }
        const semRub=equipe.filter(m=>!m.rubrica).map(m=>m.nome);
        if(semRub.length){ mostraToast("Falta rubrica de: "+semRub.join(", "),true); return; }

        setSalvando(true);
        try{
          const hoje=agora.current.toISOString().slice(0,10);
          const osBase=numeroOs.trim(); let osEfetiva=osBase; const online=navigator.onLine;
          if(online){ try{ const {data:ex}=await supa.from("pt").select("id").eq("tipo","quente").eq("numero_os_base",osBase).eq("data_atividade",hoje);
            const n=(ex||[]).length; if(n>0) osEfetiva=osBase+" Rev."+String(n).padStart(2,"0"); }catch(_){} }
          const bytes=await gerarPDF(osEfetiva); if(!bytes){ setSalvando(false); return; }
          const localId="ptq_"+Date.now();
          const registro={...montarRegistro(), numero_os:osEfetiva, numero_os_base:osBase};
          const colaboradores=equipe.map(m=>m.nome);
          const osNome=osEfetiva.replace(/[^\w.-]+/g,"_")||"sem_os";
          await salvarLocal({ id:localId, tipo:"pt_quente", nome:"PT_quente_"+osNome+".pdf", data:fmtData(agora.current),
            dataISO:new Date().toISOString(), atividade:"PT a Quente", bytes });
          setRecentes((await listarLocal()).filter(r=>r.tipo==="pt_quente"));
          if(online){
            try{ const res=await enviarPT(registro, colaboradores, bytes, osNome);
              mostraToast(osEfetiva!==osBase?("PT enviada como "+osEfetiva+"."):"PT salva e enviada!");
            }catch(e){ mostraToast("Sem conexão estável. Salva localmente; reenvie ao reconectar.",true); }
          } else { mostraToast("Offline: PT salva localmente.",true); }
        }catch(e){ mostraToast("Erro: "+e.message,true); }
        finally{ setSalvando(false); }
      }

      const NivBtns=({i})=>(<div className="nivel-btns" style={{marginTop:4}}>
        {["SIM","NÃO","NA"].map(op=>(
          <button key={op} onClick={()=>setItem(i,"v",op)}
            style={{padding:"7px 12px",borderRadius:7,border:"1px solid "+(aval[i].v===op?"#185FA5":"#bbb"),
            background:aval[i].v===op?"#185FA5":"#fff",color:aval[i].v===op?"#fff":"#333",fontSize:13,fontWeight:600,cursor:"pointer"}}>{op}</button>
        ))}
      </div>);

      return (<div>
        <div className="header">
          <a onClick={onVoltar} style={{color:"#B5D4F4",cursor:"pointer",fontSize:13,display:"inline-block",marginBottom:6}}>← Início</a>
          <h1>PT — Trabalho a Quente</h1>
          <p>Grupo Solution · FO-COR-SEG-033</p>
          <p className="meta-now">Emitida em {fmtData(agora.current)} às {fmtHora(agora.current)}</p>
        </div>

        <div className="section">
          <h2>Dados gerais</h2>
          <label>Tipo de equipe</label>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <button className={"btn "+(tipoEquipe==="igua"?"btn-blue":"btn-light")} style={{flex:1}} onClick={()=>setTipoEquipe("igua")}>Iguá</button>
            <button className={"btn "+(tipoEquipe==="contratada"?"btn-blue":"btn-light")} style={{flex:1}} onClick={()=>setTipoEquipe("contratada")}>Contratada</button>
          </div>
          {tipoEquipe==="contratada" && (<div style={{marginBottom:12}}>
            <label>Empresa contratada</label>
            <select value={empresa} onChange={e=>setEmpresa(e.target.value)} style={{width:"100%",padding:10,fontSize:15,border:"1px solid #ccc",borderRadius:8,background:"#fff"}}>
              {CONTRATADAS.map(c=><option key={c} value={c}>{c}</option>)}
              <option value="__outra__">Outra (digitar)</option>
            </select>
            {empresa==="__outra__" && <input type="text" maxLength={LC.empresa} value={empresaOutra} onChange={e=>setEmpresaOutra(e.target.value)} placeholder="Nome da empresa" style={{marginTop:8}} />}
          </div>)}
          <div className="field-row">
            <div><label>Nº O.S (TOA)</label><input type="text" maxLength={LC.os} value={numeroOs} onChange={e=>setNumeroOs(e.target.value)} /></div>
            <div><label>Setor</label><input type="text" maxLength={LC.setor} value={setor} onChange={e=>setSetor(e.target.value)} /></div>
          </div>
          <label>Local do Trabalho</label>
          <input type="text" maxLength={LC.local} value={local} onChange={e=>setLocal(e.target.value)} placeholder="Endereço / trecho" />
          <label>Líder da atividade</label>
          <input type="text" maxLength={LC.lider} value={lider} onChange={e=>setLider(e.target.value)} />
          <label>Descrição do trabalho</label>
          <input type="text" maxLength={LC.descricao} value={descricao} onChange={e=>setDescricao(e.target.value)} />
          <label>Turno</label>
          <div style={{display:"flex",gap:8}}>
            {["Manhã","Tarde","Noite"].map(t=>(
              <button key={t} className={"btn "+(turno===t?"btn-blue":"btn-light")} style={{flex:1}} onClick={()=>setTurno(t)}>{t}</button>
            ))}
          </div>
        </div>

        <div className="section">
          <h2>Avaliação da PT</h2>
          <p className="hint">Responda cada item. Toque SIM, NÃO ou NA.</p>
          {PT_QUENTE_ITENS.map((txt,i)=>(
            <div key={i} className="risco-card" style={{padding:"10px 12px"}}>
              <div style={{fontSize:13,marginBottom:2}}><b>{i+1}.</b> {txt}</div>
              <NivBtns i={i} />
              <input type="text" value={aval[i].obs} onChange={e=>setItem(i,"obs",e.target.value)} placeholder="Observação (opcional)" style={{marginTop:8,marginBottom:0,fontSize:13,padding:8}} />
            </div>
          ))}
          <div style={{marginTop:14,padding:"12px",background:"#f0f6fc",borderRadius:8}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>A atividade está segura para ser realizada?</div>
            <div style={{display:"flex",gap:8}}>
              {["SIM","NÃO"].map(op=>(
                <button key={op} onClick={()=>setSegura(op)} style={{flex:1,padding:"10px",borderRadius:7,
                  border:"1px solid "+(segura===op?"#185FA5":"#bbb"),background:segura===op?"#185FA5":"#fff",
                  color:segura===op?"#fff":"#333",fontSize:14,fontWeight:600,cursor:"pointer"}}>{op}</button>
              ))}
            </div>
          </div>
          <div className="team-item" style={{marginTop:12,background:"#fff",border:"1px solid #ddd"}}>
            <div className="risco-chk" onClick={()=>setCiente(!ciente)} style={{background:ciente?"#185FA5":"#fff",borderColor:ciente?"#185FA5":"#999",color:"#fff"}}>{ciente?"✓":""}</div>
            <span className="nome" style={{fontSize:13}} onClick={()=>setCiente(!ciente)}>Sim, estou ciente das informações declaradas</span>
          </div>
        </div>

        <div className="section">
          <h2>Emissor e verificador</h2>
          <div className="field-row">
            <div><label>Emissor da PT</label><input type="text" value={emissorNome} onChange={e=>setEmissorNome(e.target.value)} /></div>
            <div><label>Área</label><input type="text" value={emissorArea} onChange={e=>setEmissorArea(e.target.value)} /></div>
          </div>
          <div className="field-row">
            <div><label>Verificador / Dono de área</label><input type="text" value={verifNome} onChange={e=>setVerifNome(e.target.value)} /></div>
            <div><label>Área</label><input type="text" value={verifArea} onChange={e=>setVerifArea(e.target.value)} /></div>
          </div>
          <p className="hint" style={{marginTop:4}}>O campo "Aprovador da PT (Iguá)" fica em branco no PDF para assinatura da Iguá.</p>
        </div>

        <div className="section">
          <h2>Trabalhadores envolvidos</h2>
          <p className="hint">Até 10. Cada um assina com rubrica.</p>
          <div className="team-add">
            <input type="text" value={nomeTmp} onChange={e=>setNomeTmp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNome()} placeholder="Nome do trabalhador" />
            <button className="btn btn-light" onClick={addNome}>+ Add</button>
          </div>
          {equipe.map((m,i)=>(
            <div key={i} className="team-item">
              <span className="nome">{m.nome}</span>
              {m.rubrica ? <img src={m.rubrica} className="rubrica-mini" alt="rubrica" onClick={()=>setRubricaIdx(i)} />
                : <button className="btn btn-light" style={{fontSize:12,padding:"6px 10px"}} onClick={()=>setRubricaIdx(i)}>Rubricar</button>}
              <button className="del" onClick={()=>setEquipe(equipe.filter((_,j)=>j!==i))}>×</button>
            </div>
          ))}
        </div>

        <div className="footer-actions">
          <button className="btn btn-blue" disabled={salvando} onClick={salvarEGerar}>{salvando?"Salvando...":"Salvar e gerar PDF"}</button>
        </div>

        {rubricaIdx!==null && <RubricaModal onClose={()=>setRubricaIdx(null)} onSave={(d)=>{ setRubrica(rubricaIdx,d); setRubricaIdx(null); }} />}
        {toast && <div className={"toast"+(toast.err?" err":"")}>{toast.msg}</div>}
      </div>);

    function AppPT({ desc, onVoltar }) {

      const agora = useRef(new Date());
